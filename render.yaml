services:
  - type: web
    name: zero-trust-server
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: JWT_SECRET
        sync: false
      - key: TOTP_SECRET
        sync: false
      - key: RECAPTCHA_SECRET_KEY
        sync: false
      - key: CLIENT_URL
        sync: false
